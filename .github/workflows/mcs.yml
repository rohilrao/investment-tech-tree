name: Run MCS for Changed Tech Trees

on:
  push:
    paths:
      - 'data/fossil_fuel_tt_v2.json'
      - 'data/nuclear_tt.json'
  schedule:
    # Run nightly at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      run_all:
        description: 'Run all tech trees (ignore git diff)'
        required: false
        default: 'false'

jobs:
  run-mcs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # needed so git diff HEAD~1 works on push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install numpy pandas scipy tqdm scikit-learn statsmodels seaborn matplotlib jinja2

      - name: Detect changed tech tree files
        id: detect
        run: |
          TARGET_FILES="data/fossil_fuel_tt_v2.json data/nuclear_tt.json"
          
          if [ "${{ github.event.inputs.run_all }}" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            # Manual trigger or Nightly: run explicit files
            FILES="$TARGET_FILES"
          else
            # Push: only run the explicitly watched files that changed in this commit
            FILES=""
            for f in $TARGET_FILES; do
              if git diff --name-only HEAD~1 HEAD | grep -q "$f"; then
                FILES="$FILES $f "
              fi
            done
          fi

          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Detected tech trees to run: $FILES"

      - name: Run MCS for each changed tech tree
        if: steps.detect.outputs.files != ''
        run: |
          for FILE in ${{ steps.detect.outputs.files }}; do
            echo "===== Processing $FILE ====="
            python simulations/mcs_techtree_runner.py "$FILE" \
              --simulations 100 \
              --output-dir ./outputs \
              --simulation-module-path ./simulations
          done

      - name: Commit and push output JSONs
        if: steps.detect.outputs.files != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/
          git diff --cached --quiet || git commit -m "chore: update MCS outputs [skip ci]"
          git push